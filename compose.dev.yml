name: ticket-system-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ticket_system
      POSTGRES_USER: ticket_system
      POSTGRES_PASSWORD: ticket_system
    ports:
      - "${TICKET_SYSTEM_POSTGRES_PORT:-5432}:5432"
    volumes:
      - ticket-system-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_system -d ticket_system"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  ticket-system-postgres-data:
