name: deterministic-verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ticket_system_test
          POSTGRES_USER: ticket_system
          POSTGRES_PASSWORD: ticket_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ticket_system -d ticket_system_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run checkpoint:release
        env:
          TEST_DATABASE_URL: postgresql://ticket_system:ticket_system@127.0.0.1:5432/ticket_system_test
